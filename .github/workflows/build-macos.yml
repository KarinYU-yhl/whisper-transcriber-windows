name: Build macOS installer

# Builds the macOS .app and packages it into a drag-to-Applications .dmg on a
# GitHub-hosted macOS runner. Run it manually (Actions tab -> Run workflow) or
# push a tag like "mac-v1.0.27" to also publish a GitHub Release with the .dmg.
on:
  workflow_dispatch:
  push:
    tags:
      - "mac-v*"

permissions:
  contents: write

jobs:
  build:
    # macos-13 is Intel (x86_64); the resulting app runs on both Intel Macs and
    # Apple Silicon (via Rosetta 2), maximizing compatibility from one build.
    runs-on: macos-13

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: macos
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .app and .dmg
        working-directory: macos
        run: python build.py

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTranscriber-macOS
          path: macos/dist/*.dmg
          if-no-files-found: error

      - name: Publish release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: macos/dist/*.dmg
          generate_release_notes: true
